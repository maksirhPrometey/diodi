# Локальний Docker-стек: cp .env.docker.example .env && docker compose up --build
name: diodi

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-diodi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diodi}
      POSTGRES_DB: ${POSTGRES_DB:-diodi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-diodi} -d ${POSTGRES_DB:-diodi}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
      DATABASE_URL: postgres://${POSTGRES_USER:-diodi}:${POSTGRES_PASSWORD:-diodi}@db:5432/${POSTGRES_DB:-diodi}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      SITE_URL: ${SITE_URL:-http://localhost}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost}
      USE_HTTPS: "false"
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/docker.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/staticfiles:ro
      - media_volume:/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume:
