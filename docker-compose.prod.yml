# Production на Droplet: git pull && bash deploy/docker/deploy.sh
name: diodi

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-diodi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Вкажи POSTGRES_PASSWORD у .env}
      POSTGRES_DB: ${POSTGRES_DB:-diodi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-diodi} -d ${POSTGRES_DB:-diodi}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
      DATABASE_URL: postgres://${POSTGRES_USER:-diodi}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-diodi}
      GUNICORN_BIND: 0.0.0.0:8000
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz/', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/docker.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - static_volume:/staticfiles:ro
      - media_volume:/media:ro
    depends_on:
      web:
        condition: service_healthy

volumes:
  postgres_data:
  static_volume:
  media_volume:
