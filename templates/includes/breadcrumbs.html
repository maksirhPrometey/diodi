{% load seo_extras %}
{% if crumbs %}
<nav class="breadcrumbs{% if extra_class %} {{ extra_class }}{% endif %}" aria-label="Breadcrumb">
    {% for item in crumbs %}
        {% if item.url %}
            <a href="{{ item.url }}">{{ item.label }}</a><span>/</span>
        {% else %}
            <span class="breadcrumbs__current">{{ item.label }}</span>
        {% endif %}
    {% endfor %}
</nav>
{% breadcrumb_schema crumbs %}
{% endif %}
