# Production nginx: HTTP → HTTPS, Let's Encrypt з /etc/letsencrypt
# Після certbot зміни ssl_certificate* під свій домен (нижче diodi.com.ua).

resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80 default_server;
    server_name diodi.com.ua www.diodi.com.ua _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    server_name diodi.com.ua www.diodi.com.ua _;
    client_max_body_size 20M;

    ssl_certificate /etc/letsencrypt/live/diodi.com.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/diodi.com.ua/privkey.pem;

    location /static/ {
        alias /staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        set $diodi_upstream http://web:8000;
        proxy_pass $diodi_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
