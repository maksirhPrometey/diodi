# Production nginx: канонічний домен diodi.if.ua
# diodi.com.ua / www.* → 301 на https://diodi.if.ua
#
# Сертифікати (certbot на хості):
#   /etc/letsencrypt/live/diodi.if.ua/
#   /etc/letsencrypt/live/diodi.com.ua/

resolver 127.0.0.11 valid=10s ipv6=off;

# --- HTTP: редірект на HTTPS (канонічний host) ---
server {
    listen 80 default_server;
    server_name diodi.if.ua www.diodi.if.ua diodi.com.ua www.diodi.com.ua _;
    return 301 https://diodi.if.ua$request_uri;
}

# --- HTTPS: .com.ua → канонічний .if.ua ---
server {
    listen 443 ssl;
    server_name diodi.com.ua www.diodi.com.ua;

    ssl_certificate /etc/letsencrypt/live/diodi.com.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/diodi.com.ua/privkey.pem;

    return 301 https://diodi.if.ua$request_uri;
}

# --- HTTPS: www.if.ua → apex ---
server {
    listen 443 ssl;
    server_name www.diodi.if.ua;

    ssl_certificate /etc/letsencrypt/live/diodi.if.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/diodi.if.ua/privkey.pem;

    return 301 https://diodi.if.ua$request_uri;
}

# --- HTTPS: основний сайт ---
server {
    listen 443 ssl default_server;
    server_name diodi.if.ua;
    client_max_body_size 20M;

    ssl_certificate /etc/letsencrypt/live/diodi.if.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/diodi.if.ua/privkey.pem;

    location /static/ {
        alias /staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        set $diodi_upstream http://web:8000;
        proxy_pass $diodi_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
